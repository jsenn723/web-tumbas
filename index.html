<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENN STORE V13.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #007aff; --bg: #f2f2f7; --card: rgba(255, 255, 255, 0.9); --text: #1c1c1e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 100px; }
        .glass { background: var(--card); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.3); }
        #auth-screen { position: fixed; inset: 0; z-index: 9999; background: #fff; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .input-ui { width: 100%; padding: 16px; margin-top: 12px; border-radius: 14px; border: 1px solid #ddd; outline: none; font-size: 1rem; }
        .btn-p { width: 100%; padding: 16px; background: var(--p); color: white; border: none; border-radius: 14px; margin-top: 20px; font-weight: 700; }
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .banner { margin: 0 20px 20px; padding: 25px; border-radius: 24px; background: linear-gradient(135deg, #007aff, #5856d6); color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
        .card { border-radius: 20px; padding: 15px; text-align: center; transition: 0.2s; position: relative; }
        #admin-panel { position: fixed; inset: 0; background: white; z-index: 10000; display: none; padding: 20px; overflow-y: auto; }
        .cart-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; padding: 15px 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; background: #1c1c1e; color: white; transform: translateY(150px); transition: 0.5s; }
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); display: none; align-items: flex-end; z-index: 500; }
        .modal { width: 100%; background: white; border-radius: 30px 30px 0 0; padding: 30px; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div style="width:100%; max-width:350px; text-align:center;">
            <h1 style="font-size: 2.5rem; font-weight: 800;">SENN<span style="color:var(--p)">.</span></h1>
            <div id="login-form">
                <input type="text" id="u-name" class="input-ui" placeholder="Nama Kamu">
                <input type="number" id="u-wa" class="input-ui" placeholder="WhatsApp (08...)">
                <button class="btn-p" onclick="reqOTP()">Masuk & Minta OTP</button>
            </div>
            <div id="otp-form" style="display:none;">
                <input type="number" id="otp-val" class="input-ui" placeholder="Kode OTP">
                <button class="btn-p" onclick="verifOTP()">Konfirmasi</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Admin Panel</h2>
            <button onclick="closeAdmin()">Tutup</button>
        </div>
        <hr style="margin:20px 0;">
        <label>Jam Buka (0-23):</label>
        <input type="number" id="set-buka" class="input-ui">
        <label>Jam Tutup (0-23):</label>
        <input type="number" id="set-tutup" class="input-ui">
        <button class="btn-p" onclick="saveAdmin()">Simpan</button>
    </div>

    <header class="glass">
        <h1 onclick="adminTrigger()">SENN STORE.</h1>
        <div id="status-dot" style="width:12px; height:12px; border-radius:50%;"></div>
    </header>

    <div class="banner">
        <h2 id="greet">Halo!</h2>
        <p id="info-toko">Memuat status...</p>
    </div>

    <div class="grid" id="menu-grid"></div>

    <div id="modal-overlay">
        <div class="modal">
            <div id="m-img" style="font-size:4rem;"></div>
            <h2 id="m-name"></h2>
            <button class="btn-p" onclick="tambah()">Tambah ke Keranjang</button>
        </div>
    </div>

    <div class="cart-bar glass" id="cart-ui">
        <p id="c-total" style="font-weight:800;">Rp 0</p>
        <button onclick="gasOrder()" style="background:var(--p); color:white; border:none; padding:10px 20px; border-radius:12px;">ORDER WA</button>
    </div>

<script>
    let ADMINS = [
        { nama: "Senn (Owner)", wa: "6282325565971" },
        { nama: "Admin 2 (Standby)", wa: "621892158880" }
    ];

    let MENU = [
        { id: 1, n: "Cireng Ayam", p: 1000, e: "🍘", s: true },
        { id: 2, n: "Takoyaki Spec", p: 5000, e: "🐙", s: true },
        { id: 3, n: "Es Teh Manis", p: 3000, e: "🍹", s: true },
        { id: 4, n: "Es Lumut", p: 4000, e: "🌿", s: true }
    ];

    let config = JSON.parse(localStorage.getItem('senn_config')) || { buka: 0, tutup: 24 }; // Default 24 jam biar bisa tes
    let clickCount = 0, otpSkrg = "", cart = [], pSkrg = null;

    function adminTrigger() { clickCount++; if(clickCount >= 5) { document.getElementById('admin-panel').style.display='block'; clickCount=0; } }
    function saveAdmin() {
        config.buka = parseInt(document.getElementById('set-buka').value);
        config.tutup = parseInt(document.getElementById('set-tutup').value);
        localStorage.setItem('senn_config', JSON.stringify(config));
        location.reload();
    }
    function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }

    function reqOTP() {
        const n = document.getElementById('u-name').value;
        if(n.length < 2) return alert("Nama kosong!");
        let t = prompt("Pilih Admin:\n1. Senn\n2. Admin 2");
        let wa = (t == "2") ? ADMINS[1].wa : ADMINS[0].wa;
        otpSkrg = Math.floor(1000 + Math.random()*9000).toString();
        window.open(`https://wa.me/${wa}?text=Halo! Saya *${n}* minta OTP: ${otpSkrg}`);
        document.getElementById('login-form').style.display='none';
        document.getElementById('otp-form').style.display='block';
    }

    function verifOTP() {
        if(document.getElementById('otp-val').value == otpSkrg) {
            localStorage.setItem('session_senn', document.getElementById('u-name').value);
            location.reload();
        } else { alert("Salah!"); }
    }

    function render() {
        const j = new Date().getHours();
        const isOpen = j >= config.buka && j < config.tutup;
        document.getElementById('status-dot').style.background = isOpen ? "#34c759" : "#ff3b30";
        document.getElementById('info-toko').innerText = isOpen ? "Toko Buka" : "Toko Tutup";
        document.getElementById('menu-grid').innerHTML = MENU.map(i => `
            <div class="card glass" onclick="${isOpen ? `openM(${i.id})` : ''}">
                <div style="font-size:3rem;">${i.e}</div>
                <h3>${i.n}</h3>
                <p>Rp ${i.p}</p>
            </div>
        `).join('');
    }

    function openM(id) {
        pSkrg = MENU.find(x => x.id == id);
        document.getElementById('m-name').innerText = pSkrg.n;
        document.getElementById('m-img').innerText = pSkrg.e;
        document.getElementById('modal-overlay').style.display='flex';
    }

    function tambah() {
        cart.push({...pSkrg, q: 1});
        document.getElementById('modal-overlay').style.display='none';
        document.getElementById('cart-ui').style.transform='translateY(0)';
        let tot = cart.reduce((a, b) => a + b.p, 0);
        document.getElementById('c-total').innerText = `Rp ${tot}`;
    }

    function gasOrder() {
        let n = localStorage.getItem('session_senn');
        let t = prompt("Pilih Admin:\n1. Senn\n2. Admin 2");
        let wa = (t == "2") ? ADMINS[1].wa : ADMINS[0].wa;
        let list = cart.map(x => `• ${x.n}`).join('%0A');
        window.open(`https://wa.me/${wa}?text=*ORDER SENN*%0ANama: ${n}%0A${list}`);
    }

    window.onload = () => {
        if(localStorage.getItem('session_senn')) {
            document.getElementById('auth-screen').style.display='none';
            document.getElementById('greet').innerText = "Halo, " + localStorage.getItem('session_senn');
            render();
        }
    };
</script>
</body>
</html>
