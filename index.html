<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENN STORE - Owner System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #007aff; --bg: #fbfbfd; --card: #ffffff; --text: #1d1d1f; --sec: #86868b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 120px; }

        /* AUTH & ADMIN UI */
        #auth-screen { position: fixed; inset: 0; z-index: 5000; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 25px; transition: 0.5s; }
        .auth-card { background: var(--card); padding: 40px 30px; border-radius: 35px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; }
        .input-box { width: 100%; padding: 18px; margin-top: 15px; border-radius: 18px; border: 1.5px solid #eee; outline: none; background: #fdfdfd; font-size: 0.95rem; }
        .btn-auth { width: 100%; padding: 18px; background: var(--p); color: white; border: none; border-radius: 18px; margin-top: 25px; font-weight: 800; cursor: pointer; }

        /* ADMIN PANEL OVERLAY */
        #admin-panel { display: none; position: fixed; inset: 0; z-index: 4000; background: #ffffff; padding: 25px; overflow-y: auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .admin-section { background: #f8f8fa; padding: 20px; border-radius: 25px; margin-bottom: 20px; }
        .log-item { background: white; padding: 10px 15px; border-radius: 15px; margin-top: 10px; font-size: 0.75rem; border: 1px solid #eee; }

        /* MAIN APP UI */
        header { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); padding: 20px 25px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.03); }
        header h1 { font-size: 1.3rem; font-weight: 800; color: var(--p); cursor: pointer; }
        .banner { margin: 20px; padding: 25px; background: linear-gradient(135deg, #007aff, #00c6ff); border-radius: 30px; color: white; box-shadow: 0 15px 30px rgba(0,122,255,0.2); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .card { background: var(--card); border-radius: 28px; padding: 18px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.02); position: relative; }
        .img-box { height: 90px; font-size: 3.5rem; display: flex; align-items: center; justify-content: center; background: #f8f8fa; border-radius: 20px; margin-bottom: 10px; }
        .sold-out { position: absolute; inset: 0; background: rgba(255,255,255,0.7); border-radius: 28px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #ff3b30; }

        .footer { position: fixed; bottom: 30px; left: 20px; right: 20px; background: #1d1d1f; color: white; padding: 18px 25px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; transform: translateY(150px); transition: 0.6s; z-index: 200; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: flex-end; }
        .modal { background: white; width: 100%; border-radius: 35px 35px 0 0; padding: 40px 30px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <div id="login-section">
                <h1 style="font-weight: 800;">SENN STORE.</h1>
                <p style="color: var(--sec); font-size: 0.8rem; margin-bottom: 25px;">Verified User Login</p>
                <input type="text" id="reg-name" class="input-box" placeholder="Nama Anda">
                <input type="number" id="reg-phone" class="input-box" placeholder="No WhatsApp">
                <button class="btn-auth" onclick="sendLoginLog()">Minta Kode OTP</button>
            </div>
            <div id="otp-section" style="display: none;">
                <h1 style="font-weight: 800;">Verifikasi</h1>
                <p style="color: var(--sec); font-size: 0.8rem; margin-bottom: 25px;">Masukkan kode rahasia dari Senn</p>
                <input type="number" id="otp-input" class="input-box" placeholder="••••" style="text-align: center; letter-spacing: 15px; font-size: 1.5rem; font-weight: 800;">
                <button class="btn-auth" onclick="verifyOTP()">Buka Toko</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-header">
            <h1 style="font-weight: 800; font-size: 1.5rem;">⚙️ Admin Senn</h1>
            <button onclick="toggleAdmin()" style="border:none; background:#eee; padding:8px 15px; border-radius:12px; font-weight:700;">Tutup</button>
        </div>

        <div class="admin-section">
            <p style="font-weight: 800; font-size: 0.7rem; color: var(--sec); margin-bottom: 10px;">SECURITY CENTER</p>
            <label style="font-size: 0.75rem; font-weight: 700;">Ganti Kode OTP Utama:</label>
            <input type="number" id="admin-set-otp" class="input-box" style="margin-top: 5px; padding: 12px;" placeholder="Contoh: 2026">
            <button onclick="updateOTP()" class="btn-auth" style="margin-top: 10px; padding: 12px; font-size: 0.8rem;">Update OTP</button>
        </div>

        <div class="admin-section">
            <p style="font-weight: 800; font-size: 0.7rem; color: var(--sec); margin-bottom: 10px;">JAM OPERASIONAL</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="number" id="admin-set-open" class="input-box" style="margin:0; padding:12px;" placeholder="Buka (Misal: 9)">
                <input type="number" id="admin-set-close" class="input-box" style="margin:0; padding:12px;" placeholder="Tutup (Misal: 21)">
            </div>
            <button onclick="updateTime()" class="btn-auth" style="margin-top: 10px; padding: 12px; font-size: 0.8rem;">Simpan Waktu</button>
        </div>

        <div class="admin-section">
            <p style="font-weight: 800; font-size: 0.7rem; color: var(--sec); margin-bottom: 10px;">LOGIN TRACKER (SIAPA MAU MASUK)</p>
            <div id="login-logs"></div>
        </div>

        <div class="admin-section">
            <p style="font-weight: 800; font-size: 0.7rem; color: var(--sec); margin-bottom: 10px;">KONTROL STOK BARANG</p>
            <div id="admin-stock-list"></div>
        </div>
    </div>

    <header>
        <h1 onclick="toggleAdmin()">SENN STORE.</h1>
        <div style="font-size: 0.6rem; font-weight: 800; background: #e5f1ff; color: var(--p); padding: 5px 12px; border-radius: 10px;" id="u-tag">MEMBER</div>
    </header>

    <div class="banner">
        <h2 style="font-weight: 800;">PILIH MENU FAVORITMU.</h2>
        <p id="time-info" style="font-size: 0.7rem; margin-top: 5px; opacity: 0.8;">Buka Jam: 09:00 - 21:00</p>
    </div>

    <div class="grid" id="product-grid"></div>

    <div id="overlay">
        <div class="modal text-center">
            <div id="m-img" style="font-size: 4.5rem; margin-bottom: 10px;"></div>
            <h2 id="m-name" style="font-weight: 800;"></h2>
            <div style="display: flex; align-items: center; justify-content: center; gap: 30px; margin: 30px 0;">
                <button onclick="setQty(-1)" style="width: 55px; height: 55px; border-radius: 20px; border: 1.5px solid #eee; background: white; font-size: 1.5rem;">-</button>
                <span id="m-qty" style="font-size: 1.8rem; font-weight: 800;">1</span>
                <button onclick="setQty(1)" style="width: 55px; height: 55px; border-radius: 20px; background: var(--p); color: white; border: none; font-size: 1.5rem;">+</button>
            </div>
            <input type="text" id="m-note" class="input-box" placeholder="Catatan tambahan...">
            <button class="btn-auth" onclick="addToCart()">Tambah ke Keranjang</button>
            <button onclick="closeModal()" style="border:none; background:none; color:var(--sec); font-weight:700; margin-top:20px; font-size:0.8rem; width:100%;">BATAL</button>
        </div>
    </div>

    <div class="footer" id="cart-bar">
        <div>
            <p id="total-val" style="font-weight: 800; font-size: 1.1rem;">Rp 0</p>
            <p style="font-size: 0.6rem; opacity: 0.6; font-weight: 700;">READY TO CHECKOUT</p>
        </div>
        <button onclick="checkoutWA()" style="background:var(--p); color:white; border:none; padding:12px 25px; border-radius:18px; font-weight:800; font-size:0.8rem;">PESAN SEKARANG</button>
    </div>

<script>
    const WA_OWNER = "6282325565971"; // Nomor kamu Senn
    
    // DATA DEFAULT (Kesimpen di HP Owner)
    let adminSet = JSON.parse(localStorage.getItem('senn_admin')) || { 
        otp: "2026", 
        open: 9, 
        close: 21, 
        logs: [] 
    };

    let items = JSON.parse(localStorage.getItem('senn_stock')) || [
        { id: 1, name: "Cireng Renyah", price: 1000, img: "🍘", stock: true },
        { id: 2, name: "Takoyaki Spesial", price: 2000, img: "🐙", stock: true },
        { id: 3, name: "Es Teh Manis", price: 3000, img: "🍹", stock: true },
        { id: 4, name: "Es Lumut Viral", price: 4000, img: "🌿", stock: true },
        { id: 5, name: "Es Kuwut Bali", price: 3000, img: "🥥", stock: true }
    ];

    let cart = [], curP = null, qty = 1;

    // --- LOGIC AUTH & TRACKER ---
    function sendLoginLog() {
        const n = document.getElementById('reg-name').value;
        const p = document.getElementById('reg-phone').value;
        if(n.length < 3 || p.length < 10) return alert("Isi data yang benar!");
        
        // Simpan log siapa yang mau login
        adminSet.logs.unshift({ name: n, phone: p, time: new Date().toLocaleTimeString() });
        localStorage.setItem('senn_admin', JSON.stringify(adminSet));
        
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('otp-section').style.display = 'block';
    }

    function verifyOTP() {
        if(document.getElementById('otp-input').value === adminSet.otp) {
            localStorage.setItem('senn_session', JSON.stringify({ 
                n: document.getElementById('reg-name').value, 
                p: document.getElementById('reg-phone').value 
            }));
            loadApp();
        } else { alert("OTP Salah! Tanya Senn."); }
    }

    // --- ADMIN PANEL FUNCTIONS ---
    function toggleAdmin() {
        const p = document.getElementById('admin-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
        if(p.style.display === 'block') renderAdmin();
    }

    function renderAdmin() {
        document.getElementById('admin-set-otp').value = adminSet.otp;
        document.getElementById('admin-set-open').value = adminSet.open;
        document.getElementById('admin-set-close').value = adminSet.close;
        
        // Render Login Tracker
        document.getElementById('login-logs').innerHTML = adminSet.logs.slice(0, 5).map(l => `
            <div class="log-item"><b>${l.name}</b> (${l.phone}) <br> <span style="opacity:0.5">${l.time}</span></div>
        `).join('') || '<p style="font-size:0.7rem;">Belum ada login.</p>';

        // Render Stok Control
        document.getElementById('admin-stock-list').innerHTML = items.map(i => `
            <div style="display:flex; justify-content:space-between; margin-top:10px; align-items:center; background:white; padding:10px; border-radius:15px; border:1px solid #eee;">
                <span style="font-size:0.75rem; font-weight:800;">${i.name}</span>
                <button onclick="toggleStock(${i.id})" style="font-size:0.6rem; padding:5px 10px; border-radius:8px; border:none; background:${i.stock ? '#34c759':'#ff3b30'}; color:white; font-weight:800;">
                    ${i.stock ? 'ADA' : 'HABIS'}
                </button>
            </div>
        `).join('');
    }

    function updateOTP() { 
        adminSet.otp = document.getElementById('admin-set-otp').value; 
        saveAdmin(); alert("OTP Baru Disimpan!"); 
    }
    
    function updateTime() { 
        adminSet.open = parseInt(document.getElementById('admin-set-open').value); 
        adminSet.close = parseInt(document.getElementById('admin-set-close').value); 
        saveAdmin(); alert("Waktu Berhasil Diganti!"); location.reload();
    }

    function toggleStock(id) {
        items = items.map(i => i.id === id ? {...i, stock: !i.stock} : i);
        localStorage.setItem('senn_stock', JSON.stringify(items));
        renderAdmin(); renderGrid();
    }

    function saveAdmin() { localStorage.setItem('senn_admin', JSON.stringify(adminSet)); }

    // --- MAIN APP LOGIC ---
    function loadApp() {
        const session = localStorage.getItem('senn_session');
        if(session) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('u-tag').innerText = JSON.parse(session).n.toUpperCase();
            renderGrid();
        }
    }

    function renderGrid() {
        const h = new Date().getHours();
        const isOpen = h >= adminSet.open && h < adminSet.close;
        document.getElementById('time-info').innerText = `Buka Jam: ${adminSet.open}:00 - ${adminSet.close}:00`;

        document.getElementById('product-grid').innerHTML = items.map(i => `
            <div class="card" onclick="${i.stock && isOpen ? `openModal(${i.id})` : ''}">
                ${!i.stock ? '<div class="sold-out">HABIS</div>' : ''}
                ${!isOpen ? '<div class="sold-out" style="color:#888">TUTUP</div>' : ''}
                <div class="img-box">${i.img}</div>
                <h3 style="font-size:0.8rem;">${i.name}</h3>
                <p>Rp ${i.price.toLocaleString()}</p>
            </div>
        `).join('');
    }

    function openModal(id) {
        curP = items.find(i => i.id === id); qty = 1;
        document.getElementById('m-name').innerText = curP.name;
        document.getElementById('m-img').innerText = curP.img;
        document.getElementById('m-qty').innerText = "1";
        document.getElementById('m-note').value = "";
        document.getElementById('overlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('overlay').style.display = 'none'; }
    function setQty(v) { qty = Math.max(1, qty + v); document.getElementById('m-qty').innerText = qty; }

    function addToCart() {
        cart.push({...curP, q: qty, note: document.getElementById('m-note').value});
        closeModal();
        document.getElementById('cart-bar').style.transform = "translateY(0)";
        const total = cart.reduce((s, i) => s + (i.price * i.q), 0);
        document.getElementById('total-val').innerText = `Rp ${total.toLocaleString()}`;
    }

    function checkoutWA() {
        const user = JSON.parse(localStorage.getItem('senn_session'));
        let list = cart.map(i => `• *${i.name}* (${i.q}x) ${i.note ? '[_'+i.note+'_]' : ''}`).join('%0A');
        let total = cart.reduce((s, i) => s + (i.price * i.q), 0);
        let msg = `*PESANAN SENN STORE*%0A%0A*Nama:* ${user.n}%0A*WA:* ${user.p}%0A%0A*Menu:*%0A${list}%0A%0A*Total: Rp ${total.toLocaleString()}*`;
        window.open(`https://wa.me/${WA_OWNER}?text=${msg}`, '_blank');
    }

    window.onload = loadApp;
</script>
</body>
</html>
