<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENN STORE V15.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #007aff; --bg: #0a0a0c; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at top right, #1e1e26, #0a0a0c); color: #fff; min-height: 100vh; padding-bottom: 100px; }
        .liquid-glass { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; }
        
        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; padding: 25px; }
        .input-ui { width: 100%; padding: 18px; margin-top: 15px; border-radius: 18px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; outline: none; }
        .btn-p { width: 100%; padding: 18px; background: var(--p); color: white; border: none; border-radius: 18px; margin-top: 20px; font-weight: 800; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; border-radius: 25px 25px 0 0; }
        .nav-item { text-align: center; opacity: 0.5; font-size: 0.7rem; font-weight: 600; }
        .nav-item.active { opacity: 1; color: var(--p); }

        /* Product Card */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .card { padding: 20px; text-align: center; position: relative; }
        .rating { color: #ffcc00; font-size: 0.7rem; margin: 5px 0; }
        
        /* Pages */
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Qty & Note UI */
        .qty-box { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0; }
        .qty-btn { width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--border); background: none; color: white; font-size: 1.2rem; }

        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; align-items: flex-end; z-index: 2000; }
        .modal { width: 100%; padding: 30px; border-radius: 30px 30px 0 0; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="modal liquid-glass" style="max-width:360px; text-align:center;">
            <h1 style="font-size:2rem; margin-bottom:10px;">SENN<span style="color:var(--p)">.</span></h1>
            <div id="login-form">
                <input type="text" id="u-name" class="input-ui" placeholder="Nama Kamu">
                <input type="number" id="u-wa" class="input-ui" placeholder="WhatsApp (08...)">
                <button class="btn-p" onclick="reqOTP()">GAS LOGIN</button>
            </div>
            <div id="otp-form" style="display:none;">
                <input type="number" id="otp-val" class="input-ui" placeholder="Kode OTP" style="text-align:center; letter-spacing:5px;">
                <button class="btn-p" onclick="verifOTP()">KONFIRMASI</button>
            </div>
        </div>
    </div>

    <div id="home-page" class="page" style="display:block;">
        <header style="text-align:center; margin-bottom:20px;">
            <h1 onclick="adminTrigger()">SENN STORE.</h1>
            <p id="info-toko" style="font-size:0.7rem; opacity:0.5;"></p>
        </header>
        <div class="grid" id="menu-grid"></div>
    </div>

    <div id="account-page" class="page">
        <h2 style="margin-bottom:20px;">Akun Saya</h2>
        <div class="liquid-glass" style="padding:20px; margin-bottom:20px;">
            <p style="opacity:0.5; font-size:0.8rem;">Nama Pengguna</p>
            <h3 id="profile-name">-</h3>
        </div>
        <button class="btn-p" style="background:#ff3b30;" onclick="logout()">LOGOUT</button>
    </div>

    <div id="modal-overlay">
        <div class="modal liquid-glass">
            <h2 id="m-name"></h2>
            <div class="qty-box">
                <button class="qty-btn" onclick="adjQty(-1)">-</button>
                <span id="m-qty" style="font-size:1.5rem; font-weight:800;">1</span>
                <button class="qty-btn" onclick="adjQty(1)">+</button>
            </div>
            <input type="text" id="m-note" class="input-ui" placeholder="Catatan (Contoh: Tanpa Mayones)">
            <button class="btn-p" onclick="tambah()">TAMBAH KE KERANJANG</button>
            <button onclick="closeM()" style="width:100%; background:none; border:none; color:#888; margin-top:15px;">BATAL</button>
        </div>
    </div>

    <div id="cart-btn" class="liquid-glass" style="position:fixed; bottom:85px; left:20px; right:20px; padding:15px; display:none; justify-content:space-between; align-items:center; z-index:900;">
        <span id="c-total" style="font-weight:800;">Rp 0</span>
        <button onclick="gasOrder()" style="background:var(--p); color:white; border:none; padding:8px 15px; border-radius:10px; font-weight:800;">CHECKOUT</button>
    </div>

    <nav class="bottom-nav liquid-glass">
        <div class="nav-item active" onclick="nav('home', this)">🏠<br>Home</div>
        <div class="nav-item" onclick="nav('account', this)">👤<br>Akun</div>
    </nav>

<script>
    const MY_WA = "6282325565971"; // Ganti nomor Senn
    const MENU = [
        { id: 1, n: "Cireng Ayam", p: 1000, e: "🍘", r: 4.8 },
        { id: 2, n: "Takoyaki Spec", p: 5000, e: "🐙", r: 5.0 },
        { id: 3, n: "Es Teh Manis", p: 3000, e: "🍹", r: 4.5 },
        { id: 4, n: "Es Lumut", p: 4000, e: "🌿", r: 4.9 }
    ];

    let cart = [], pSkrg = null, qty = 1, otpSkrg = "";

    function nav(p, el) {
        document.querySelectorAll('.page').forEach(x => x.style.display='none');
        document.getElementById(p+'-page').style.display='block';
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
    }

    function reqOTP() {
        const n = document.getElementById('u-name').value;
        if(!n) return alert("Nama wajib diisi!");
        otpSkrg = Math.floor(1000 + Math.random()*9000).toString();
        window.open(`https://wa.me/${MY_WA}?text=Halo Senn! Saya *${n}* mau masuk. Kode OTP: ${otpSkrg}`);
        document.getElementById('login-form').style.display='none';
        document.getElementById('otp-form').style.display='block';
    }

    function verifOTP() {
        if(document.getElementById('otp-val').value == otpSkrg) {
            localStorage.setItem('user_senn', document.getElementById('u-name').value);
            location.reload();
        } else { alert("OTP Salah!"); }
    }

    function render() {
        document.getElementById('menu-grid').innerHTML = MENU.map(i => `
            <div class="card liquid-glass" onclick="openM(${i.id})">
                <div style="font-size:3rem;">${i.e}</div>
                <div class="rating">⭐ ${i.r}</div>
                <h3 style="font-size:0.8rem;">${i.n}</h3>
                <p style="color:var(--p); font-weight:800;">Rp ${i.p.toLocaleString()}</p>
            </div>
        `).join('');
    }

    function openM(id) {
        pSkrg = MENU.find(x => x.id == id); qty = 1;
        document.getElementById('m-name').innerText = pSkrg.n;
        document.getElementById('m-qty').innerText = "1";
        document.getElementById('m-note').value = "";
        document.getElementById('modal-overlay').style.display='flex';
    }
    function adjQty(v) { qty = Math.max(1, qty + v); document.getElementById('m-qty').innerText = qty; }
    function closeM() { document.getElementById('modal-overlay').style.display='none'; }

    function tambah() {
        const note = document.getElementById('m-note').value || "-";
        cart.push({...pSkrg, q: qty, note: note});
        closeM();
        document.getElementById('cart-btn').style.display='flex';
        let tot = cart.reduce((a, b) => a + (b.p * b.q), 0);
        document.getElementById('c-total').innerText = `Rp ${tot.toLocaleString()}`;
    }

    function gasOrder() {
        let n = localStorage.getItem('user_senn');
        let list = cart.map(x => `• ${x.n} (${x.q}x) %0A  _Catatan: ${x.note}_`).join('%0A');
        let tot = cart.reduce((a, b) => a + (b.p * b.q), 0);
        window.open(`https://wa.me/${MY_WA}?text=*ORDER SENN*%0A%0ANama: ${n}%0A%0A${list}%0A%0A*Total: Rp ${tot.toLocaleString()}*`);
    }

    function logout() { localStorage.removeItem('user_senn'); location.reload(); }

    window.onload = () => {
        let u = localStorage.getItem('user_senn');
        if(u) {
            document.getElementById('auth-screen').style.display='none';
            document.getElementById('profile-name').innerText = u;
            render();
        }
    };
</script>
</body>
</html>
