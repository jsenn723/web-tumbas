<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENN STORE V18.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* CSS LIQUID GLASS - JANGAN DIUBAH BIAR TETEP ASTETIK */
        :root { --p: #007aff; --bg: #0a0a0c; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.1); --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at top right, #1e1e26, #0a0a0c); color: var(--text); min-height: 100vh; padding-bottom: 120px; transition: 0.5s; }
        .liquid-glass { background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 28px; }
        header { padding: 20px; margin: 15px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .card { padding: 20px; text-align: center; border-radius: 25px; border: 1px solid var(--border); background: var(--glass); position: relative; animation: reveal 0.6s ease forwards; }
        @keyframes reveal { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .price { color: var(--p); font-weight: 800; font-size: 0.9rem; }
        .btn-p { width: 100%; padding: 18px; background: var(--p); color: white; border: none; border-radius: 20px; font-weight: 800; margin-top: 15px; }
        #auth-screen { position: fixed; inset: 0; z-index: 9000; background: #000; display: flex; align-items: center; justify-content: center; padding: 25px; }
        .bottom-nav { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 75px; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); display: none; align-items: flex-end; z-index: 3000; }
        .varian-btn { padding: 8px 12px; border-radius: 12px; border: 1px solid var(--border); background: none; color: white; font-size: 0.7rem; margin: 5px 2px; }
        .varian-btn.active { background: var(--p); border: none; }
    </style>
</head>
<body>

<script>
    /* =========================================
       PENGATURAN TOKO (EDIT DI SINI AJA, SENN!)
       =========================================
    */
    const NOMOR_WA_SENN = "6282325565971"; 

    // ATUR JAM OPERASIONAL (0-24)
    const JAM_BUKA  = 8;  // Jam 8 Pagi
    const JAM_TUTUP = 21; // Jam 9 Malem

    // ATUR MENU, HARGA, RATING, & STOK
    // stok: true (Ada), stok: false (Habis/Redup)
    const MENU_SENN = [
        { id: 1, n: "Cireng Ayam", p: 1000, e: "🍘", r: 4.9, stok: true, v: null },
        { id: 2, n: "Takoyaki Spec", p: 5000, e: "🐙", r: 5.0, stok: true, v: null },
        { id: 3, n: "Es Teh Manis", e: "🍹", r: 4.5, stok: true, 
          v: [{n: "Biasa", p: 2.000}, {n: "Besar", p: 3000}] 
        },
        { id: 4, n: "Es Lumut", e: "🌿", r: 4.8, stok: true, 
          v: [{n: "Biasa", p: 4.000}, {n: "Besar", p: 5.000}] 
        },
        { id: 5, n: "Es Kuwut", p: 3000, e: "🥥", r: 4.7, stok: true, v: null }
    ];

    /* =========================================
       KODE DI BAWAH INI ADALAH MESINNYA
       JANGAN DIUBAH KALAU NGGAK MAU REPOT 😹
       =========================================
    */

    let cart = [], cur = null, qty = 1, vIdx = 0, otp = "";

    function login() {
        let n = document.getElementById('u-name').value;
        if(n) { 
            otp = Math.floor(1000 + Math.random()*9000).toString();
            window.open(`https://wa.me/${NOMOR_WA_SENN}?text=Halo Senn! Saya ${n} minta OTP: ${otp}`);
            document.getElementById('l-box').style.display='none';
            document.getElementById('o-box').style.display='block';
        }
    }

    function verif() {
        if(document.getElementById('o-val').value == otp) {
            localStorage.setItem('senn_user', document.getElementById('u-name').value);
            location.reload();
        } else { alert("Salah!"); }
    }

    function logout() { localStorage.removeItem('senn_user'); location.reload(); }

    function render() {
        const j = new Date().getHours();
        const isOpen = j >= JAM_BUKA && j < JAM_TUTUP;
        document.getElementById('t-info').innerText = isOpen ? `Buka (Tutup jam ${JAM_TUTUP}:00)` : `Toko Tutup (Buka jam ${JAM_BUKA}:00)`;
        
        document.getElementById('grid').innerHTML = MENU_SENN.map(i => `
            <div class="card" style="opacity: ${isOpen && i.stok ? '1' : '0.4'}" onclick="${isOpen && i.stok ? `openM(${i.id})` : ''}">
                ${!i.stok ? '<div style="color:red; font-size:0.6rem; font-weight:800;">HABIS</div>' : ''}
                <div style="font-size:3rem;">${i.e}</div>
                <div style="color:#ffcc00; font-size:0.7rem;">⭐ ${i.r}</div>
                <h3 style="font-size:0.8rem; margin:5px 0;">${i.n}</h3>
                <p class="price">${i.v ? `Rp ${i.v[0].p}k+` : `Rp ${i.p.toLocaleString()}`}</p>
            </div>
        `).join('');
    }

    function openM(id) {
        cur = MENU_SENN.find(x => x.id == id); qty = 1; vIdx = 0;
        document.getElementById('m-name').innerText = cur.n;
        document.getElementById('m-qty').innerText = "1";
        document.getElementById('m-note').value = "";
        let vs = document.getElementById('v-sec');
        vs.innerHTML = cur.v ? cur.v.map((v, i) => `<button class="varian-btn ${i==0?'active':''}" onclick="setV(${i}, this)">${v.n} (Rp ${v.p})</button>`).join('') : '';
        document.getElementById('modal-overlay').style.display='flex';
    }

    function setV(i, el) { vIdx = i; document.querySelectorAll('.varian-btn').forEach(x => x.classList.remove('active')); el.classList.add('active'); }
    function adj(v) { qty = Math.max(1, qty + v); document.getElementById('m-qty').innerText = qty; }
    function closeM() { document.getElementById('modal-overlay').style.display='none'; }

    function add() {
        const p = cur.v ? cur.v[vIdx].p : cur.p;
        const n = cur.v ? `${cur.n} (${cur.v[vIdx].n})` : cur.n;
        cart.push({ n: n, p: p, q: qty, note: document.getElementById('m-note').value || "-" });
        closeM();
        document.getElementById('c-bar').style.display='flex';
        let tot = cart.reduce((a, b) => a + (b.p * b.q), 0);
        document.getElementById('c-tot').innerText = `Rp ${tot.toLocaleString()}`;
    }

    function checkout() {
        let u = localStorage.getItem('senn_user');
        let list = cart.map(x => `• ${x.n} (${x.q}x) - ${x.note}`).join('%0A');
        let tot = cart.reduce((a, b) => a + (b.p * b.q), 0);
        window.open(`https://wa.me/${NOMOR_WA_SENN}?text=*ORDER SENN*%0ANama: ${u}%0A%0A${list}%0A%0A*Total: Rp ${tot.toLocaleString()}*`);
    }

    window.onload = () => {
        let u = localStorage.getItem('senn_user');
        if(u) {
            document.getElementById('auth-screen').style.display='none';
            document.getElementById('p-name').innerText = u.toUpperCase();
            render();
        }
    };
</script>

    <div id="auth-screen">
        <div class="liquid-glass" style="width:100%; max-width:380px; padding:40px; text-align:center;">
            <h1>SENN<span style="color:var(--p)">.</span></h1>
            <div id="l-box">
                <input type="text" id="u-name" class="input-ui" placeholder="Nama Kamu" style="width:100%; padding:15px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); border-radius:15px; margin-top:20px;">
                <button class="btn-p" onclick="login()">MASUK</button>
            </div>
            <div id="o-box" style="display:none;">
                <input type="number" id="o-val" class="input-ui" placeholder="OTP" style="width:100%; padding:15px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); border-radius:15px; margin-top:20px; text-align:center; letter-spacing:10px;">
                <button class="btn-p" onclick="verif()">VERIFIKASI</button>
            </div>
        </div>
    </div>

    <header class="liquid-glass">
        <h2>SENN STORE.</h2>
        <p id="t-info" style="font-size:0.7rem; opacity:0.6; margin-top:5px;"></p>
    </header>

    <div id="home-p" class="page">
        <div class="grid" id="grid"></div>
    </div>

    <div id="acc-p" class="page" style="display:none; padding:30px; text-align:center;">
        <div class="liquid-glass" style="padding:40px;">
            <h1 id="p-name">USER</h1>
            <button class="btn-p" style="background:#ff3b30;" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="liquid-glass" style="width:100%; padding:30px; border-radius:35px 35px 0 0;">
            <h2 id="m-name"></h2>
            <div id="v-sec" style="margin:15px 0;"></div>
            <div style="display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:20px;">
                <button onclick="adj(-1)" style="width:45px; height:45px; border-radius:12px; border:1px solid var(--border); background:none; color:white;">-</button>
                <span id="m-qty" style="font-size:1.5rem; font-weight:800;">1</span>
                <button onclick="adj(1)" style="width:45px; height:45px; border-radius:12px; background:var(--p); border:none; color:white;">+</button>
            </div>
            <input type="text" id="m-note" placeholder="Catatan (Contoh: Tanpa Mayones)" style="width:100%; padding:15px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); border-radius:15px;">
            <button class="btn-p" onclick="add()">TAMBAH KE KERANJANG</button>
            <button onclick="closeM()" style="width:100%; background:none; border:none; color:#888; margin-top:15px;">BATAL</button>
        </div>
    </div>

    <div id="c-bar" class="liquid-glass" style="position:fixed; bottom:100px; left:20px; right:20px; padding:18px; display:none; justify-content:space-between; align-items:center; z-index:1500;">
        <div><p id="c-tot" style="font-weight:800;">Rp 0</p></div>
        <button onclick="checkout()" style="background:var(--p); color:white; border:none; padding:10px 20px; border-radius:15px; font-weight:800;">CHECKOUT</button>
    </div>

    <nav class="bottom-nav liquid-glass">
        <div onclick="document.getElementById('home-p').style.display='block'; document.getElementById('acc-p').style.display='none';">🏠<br><span style="font-size:0.6rem">Home</span></div>
        <div onclick="document.getElementById('home-p').style.display='none'; document.getElementById('acc-p').style.display='block';">👤<br><span style="font-size:0.6rem">Akun</span></div>
    </nav>

</body>
</html>
