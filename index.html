<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENN STORE - ORDER DIRECT</title>
    <style>
        :root {
            --primary: #10b981;
            --dark: #0f172a;
            --light-bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--light-bg); color: var(--text-main); }
        .app { max-width: 450px; margin: 0 auto; min-height: 100vh; background: var(--light-bg); position: relative; }
        
        /* Header */
        .header { background: var(--white); padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .status-badge { font-size: 0.7rem; font-weight: 800; padding: 6px 12px; border-radius: 20px; text-transform: uppercase; }
        .status-open { background: #dcfce7; color: #166534; }
        .status-closed { background: #fee2e2; color: #991b1b; }

        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .card { background: var(--white); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; position: relative; padding-bottom: 10px; }
        .img-box { height: 110px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; }
        .info { padding: 12px; }
        .name { font-size: 0.85rem; font-weight: 700; }
        .price { font-size: 0.9rem; font-weight: 800; color: var(--primary); }
        .add-btn { width: 35px; height: 35px; background: var(--dark); color: white; border: none; border-radius: 10px; position: absolute; bottom: 10px; right: 10px; font-weight: bold; cursor: pointer; }

        /* Modal */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 1000; align-items: flex-end; }
        .modal { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 25px 25px 0 0; }
        .qty-ctrl { display: flex; align-items: center; gap: 20px; margin: 20px 0; justify-content: center; }
        .q-btn { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--border); background: white; font-size: 1.2rem; cursor: pointer; }
        .note { width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 12px; margin-top: 10px; outline: none; background: #f9fafb; font-size: 0.85rem; }

        /* Footer Cart */
        .footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; background: var(--white); border-top: 1px solid var(--border); z-index: 200; display: none; padding: 15px 20px 30px; border-radius: 20px 20px 0 0; box-shadow: 0 -10px 20px rgba(0,0,0,0.05); }
        .checkout-btn { background: var(--primary); color: white; padding: 15px 30px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .checkout-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h1>SENN STORE</h1>
        <div id="status"></div>
    </div>

    <div class="grid" id="products"></div>

    <div id="overlay">
        <div class="modal">
            <h2 id="m-name"></h2>
            <div class="qty-ctrl">
                <button class="q-btn" onclick="setQty(-1)">-</button>
                <span id="m-qty" style="font-size: 1.5rem; font-weight: 800;">1</span>
                <button class="q-btn" onclick="setQty(1)">+</button>
            </div>
            <input type="text" id="m-note" class="note" placeholder="Contoh: Sausnya dipisah ya...">
            <button class="checkout-btn" onclick="add()">Konfirmasi & Tambah</button>
        </div>
    </div>

    <div class="footer" id="cart-ui">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div id="t-price" style="font-weight:800; font-size:1.2rem;">Rp 0</div>
            <div id="t-count" style="font-size:0.7rem; font-weight:700; color:var(--text-muted);">0 Item</div>
        </div>
        <button class="checkout-btn" id="send-wa" onclick="sendToWA()">
            <span>Kirim Pesanan ke WhatsApp</span>
        </button>
    </div>
</div>

<script>
    const WA_NUMBER = "628xxxxxxxxxx"; // <--- GANTI NOMOR WA LO DI SINI SENN!
    const items = [
        { id: 1, name: "Cireng Renyah", price: 1000, icon: "🍘" },
        { id: 2, name: "Takoyaki Spesial", price: 2000, icon: "🐙" },
        { id: 3, name: "Es Teh Manis", price: 3000, icon: "🍹" },
        { id: 4, name: "Es Lumut Viral", price: 4000, icon: "🌿" },
        { id: 5, name: "Es Kuwut Bali", price: 3000, icon: "🥥" }
    ];

    let cart = [];
    let cur = null;
    let qty = 1;

    function init() {
        const hours = new Date().getHours();
        const isOpen = (hours >= 9 && hours < 21);
        document.getElementById('status').innerHTML = isOpen ? 
            `<span class="status-badge status-open">● Buka</span>` : 
            `<span class="status-badge status-closed">● Tutup</span>`;
        document.getElementById('send-wa').disabled = !isOpen;

        document.getElementById('products').innerHTML = items.map(p => `
            <div class="card">
                <div class="img-box">${p.icon}</div>
                <div class="info">
                    <div class="name">${p.name}</div>
                    <div class="price">Rp ${p.price.toLocaleString()}</div>
                </div>
                <button class="add-btn" onclick="show(${p.id})">+</button>
            </div>`).join('');
    }

    function show(id) {
        cur = items.find(i => i.id === id);
        qty = 1;
        document.getElementById('m-name').innerText = cur.name;
        document.getElementById('m-qty').innerText = "1";
        document.getElementById('m-note').value = "";
        document.getElementById('overlay').style.display = 'flex';
    }

    function setQty(v) {
        qty = Math.max(1, qty + v);
        document.getElementById('m-qty').innerText = qty;
    }

    function add() {
        cart.push({ ...cur, qty, note: document.getElementById('m-note').value });
        document.getElementById('overlay').style.display = 'none';
        renderCart();
    }

    function renderCart() {
        if(cart.length === 0) return;
        document.getElementById('cart-ui').style.display = 'block';
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        document.getElementById('t-price').innerText = `Rp ${total.toLocaleString()}`;
        document.getElementById('t-count').innerText = `${cart.length} Jenis Barang`;
    }

    function sendToWA() {
        if(cart.length === 0) return;
        
        let list = cart.map(i => `• *${i.name}* (${i.qty}x)${i.note ? '%0A  _Catatan: ' + i.note + '_' : ''}`).join('%0A%0A');
        let total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        
        let text = `*HALO SENN STORE!*%0A` +
                   `Saya mau pesan nih:%0A%0A` +
                   `${list}%0A%0A` +
                   `*TOTAL PEMBAYARAN: Rp ${total.toLocaleString()}*%0A%0A` +
                   `_Mohon segera diproses ya!_`;

        // INI FITUR OTOMATIS KE WA PENJUAL
        window.open(`https://wa.me/${082325565971}?text=${text}`, '_blank');
    }

    init();
    setInterval(init, 5000); // Cek status buka/tutup tiap 5 detik
</script>

</body>
</html>
